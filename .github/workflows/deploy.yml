name: deploy

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'xp3-packer/**/*'
      - 'xp3-unpacker/**/*'

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Commit SHA
        id: commit-sha
        run: |
          "short_sha=" + "${{ github.sha }}".SubString(0, 8) >> $env:GITHUB_OUTPUT

      - name: Setup rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-pc-windows-msvc,x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'deploy'
          cache-on-failure: true
          cache-all-crates: true

      - name: Build
        run: cargo build --bins --release --target x86_64-pc-windows-msvc --target x86_64-unknown-linux-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'xp3-tool-${{ steps.commit-sha.outputs.short_sha }}'
          path: |
            target/x86_64-pc-windows-msvc/release/xp3-packer.exe
            target/x86_64-pc-windows-msvc/release/xp3-unpacker.exe
            target/x86_64-unknown-linux-gnu/release/xp3-packer
            target/x86_64-unknown-linux-gnu/release/xp3-unpacker
